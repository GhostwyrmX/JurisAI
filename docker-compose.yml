version: '3.8'

services:
  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001
    depends_on:
      - backend
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/juris_ai
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mongodb
      - ai-service
    env_file:
      - .env
    volumes:
      - ./backend-node:/app
      - /app/node_modules

  # AI Service
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai-service
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/juris_ai
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - mongodb
      - redis
      - ollama
    env_file:
      - .env
    volumes:
      - ./ai-service-python:/app
      - ./legal_modules:/app/legal_modules
      - ./dataset:/app/dataset
      - ./vector_index:/app/vector_index

  # Database
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=3007@Gamer

  # Cache
  redis:
    image: redis:7.0
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # LLM Service
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ai-service-python/models:/models
    deploy:
      resources:
        reservations:
          memory: 4G
    # Start Ollama server (models will be pulled manually or on first request)
    entrypoint: ollama
    command: serve

volumes:
  mongodb_data:
  redis_data:
  ollama_data:

networks:
  default:
    name: juris-ai-network